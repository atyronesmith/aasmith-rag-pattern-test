    .Values.secret.user | b64enc | quote }}'
  source_fields:
  - host
  - port
  - dbname
  - password
  - user
- group: pgvector
  field_name: uri
  template: '{{ printf "postgresql://%s:%s@%s.%s:%s/%s" .Values.secret.user .Values.secret.password
    .Values.secret.host (include "pgvector.namespace" .) .Values.secret.port .Values.secret.dbname
    | b64enc | quote }}'
  source_fields:
  - user
  - password
  - host
  - port
  - dbname
